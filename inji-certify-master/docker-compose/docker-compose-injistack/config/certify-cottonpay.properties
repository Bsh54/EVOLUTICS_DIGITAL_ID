# Configuration CottonPay pour Inji Certify
# Propriétés spécifiques pour l'émission de reçus de vente de coton

# Plugin configuration - Utilisation d'un plugin personnalisé pour CottonPay
mosip.certify.plugin.provider.class=io.mosip.certify.integration.service.DataProviderPlugin

# CottonPay Sale Receipt Configuration
mosip.certify.cottonpay.enabled=true
mosip.certify.cottonpay.credential-type=CottonPaySaleReceipt
mosip.certify.cottonpay.scope=openid

# DID Configuration pour CottonPay
mosip.certify.data-provider-plugin.did-url=did:web:mosip.github.io:inji-config:vc-local-ed25519

# Database configuration pour les ventes
mosip.certify.cottonpay.db.url=jdbc:postgresql://database:5432/inji_certify
mosip.certify.cottonpay.db.username=postgres
mosip.certify.cottonpay.db.password=postgres

# Credential validity (30 jours)
mosip.certify.cottonpay.credential.validity-days=30

# Issuer information
mosip.certify.cottonpay.issuer.name=CottonPay ID - Bénin
mosip.certify.cottonpay.issuer.country=BEN
mosip.certify.cottonpay.issuer.logo=https://via.placeholder.com/150/F59E0B/FFFFFF?text=CottonPay

# Integration avec CottonPay Backend
mosip.certify.cottonpay.backend.url=http://host.docker.internal:3002
mosip.certify.cottonpay.backend.api-key=${COTTONPAY_API_KEY:cottonpay-secret-key}

# Webhook pour notifier CottonPay après émission du credential
mosip.certify.cottonpay.webhook.enabled=true
mosip.certify.cottonpay.webhook.url=${mosip.certify.cottonpay.backend.url}/api/credentials/webhook

# Logging
logging.level.io.mosip.certify.cottonpay=DEBUG

# --- Surcharges Locales ---
# Autoriser eSignet local (au lieu du serveur mock public)
mosip.certify.authorization.url=http://host.docker.internal:8088
mosip.certify.authn.issuer-uri=http://localhost:8088/v1/esignet
mosip.certify.authn.jwk-set-uri=http://host.docker.internal:8088/v1/esignet/oauth/.well-known/jwks.json

# Autoriser spécifiquement le client OIDC CottonPay
mosip.certify.authn.allowed-audiences={ 'cottonpay-client', 'http://localhost:8091/v1/certify/issuance/credential' }
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG

# Accepter les algorithmes modernes de jetons JWT (dont celui d'eSignet)
spring.security.oauth2.resourceserver.jwt.jws-algorithms=RS256,PS256,ES256
mosip.certify.supported.jwt-proof-alg={'RS256','PS256','ES256','Ed25519'}

# On assouplit également la correspondance exacte de l'audience pour éviter tout blocage strict
mosip.certify.authn.allowed-audiences={ 'cottonpay-client', 'http://localhost:8091/v1/certify/issuance/credential', 'cottonpay-rp' }

# --- BYPASS DE SÉCURITÉ POUR TESTS LOCAUX ---
# Désactiver le pare-feu OAuth2 sur l'endpoint d'émission des reçus
mosip.certify.security.ignore-auth-urls=**/actuator/**,**/error,**/swagger-ui/**,**/v3/api-docs/**,**/issuance/credential,**/issuance/**
