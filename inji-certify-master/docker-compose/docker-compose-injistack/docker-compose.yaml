version: '3.8'

services:
  certify:
    image: mosipid/inji-certify-with-plugins:0.13.1
    user: root
    ports:
      - 8090:8090
    environment:
      - container_user=mosip
      - active_profile_env=default, csvdp-farmer, cottonpay
      - SPRING_CONFIG_NAME=certify
      - SPRING_CONFIG_LOCATION=/home/mosip/config/
      - enable_certify_artifactory=false
      - download_hsm_client=false
      - mosip_certify_domain_url=http://certify-nginx:80
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5455/mosip_esignet?currentSchema=certify
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    volumes:
      - ./config/certify-default.properties:/home/mosip/config/certify-default.properties
      - ./config/certify-csvdp-farmer.properties:/home/mosip/config/certify-csvdp-farmer.properties
      - ./config/certify-mock-mdl.properties:/home/mosip/config/certify-mock-mdl.properties
      - ./config/certify-cottonpay.properties:/home/mosip/config/certify-cottonpay.properties
      - ./data/CERTIFY_PKCS12:/home/mosip/CERTIFY_PKCS12
      - ./config/farmer_identity_data.csv:/home/mosip/config/farmer_identity_data.csv
    networks:
      - mosip_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  certify-nginx:
    image: nginx:stable
    ports:
      - 8091:80
    volumes:
      - ./certify-nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mosip_network
    depends_on:
      - certify

networks:
  mosip_network:
    name: mosip_network
    external: true

volumes:
  cache:
    driver: local
