<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification de Reçu - CottonPay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #F59E0B;
            --secondary: #FBBF24;
            --cta: #8B5CF6;
            --background: #0F172A;
            --text: #F8FAFC;
            --success: #10B981;
            --danger: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, var(--primary) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, var(--cta) 0%, transparent 50%);
            opacity: 0.15;
            animation: rotate 30s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .verify-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
        }

        .verify-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .verify-title {
            color: var(--primary);
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .verify-subtitle {
            color: rgba(248, 250, 252, 0.7);
            font-size: 14px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            margin: 20px 0;
        }

        .status-verified {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid rgba(16, 185, 129, 0.4);
            color: var(--success);
        }

        .status-invalid {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid rgba(239, 68, 68, 0.4);
            color: var(--danger);
        }

        .transaction-section {
            margin: 30px 0;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }

        .section-title {
            color: var(--secondary);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .amount-display {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
        }

        .amount-label {
            color: rgba(248, 250, 252, 0.7);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .amount-value {
            color: var(--success);
            font-size: 42px;
            font-weight: 800;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-label {
            color: rgba(248, 250, 252, 0.6);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: var(--text);
            font-weight: 600;
            font-size: 16px;
        }

        .history-section {
            margin: 30px 0;
        }

        .history-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .summary-card {
            background: rgba(139, 92, 246, 0.1);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .summary-label {
            color: rgba(248, 250, 252, 0.7);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .summary-value {
            color: var(--cta);
            font-size: 28px;
            font-weight: 800;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text);
            font-size: 18px;
        }

        .error-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--danger);
        }

        .history-list {
            margin-top: 20px;
            display: grid;
            gap: 12px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-date {
            color: rgba(248, 250, 252, 0.6);
            font-size: 14px;
        }

        .history-amount {
            color: var(--success);
            font-size: 18px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="verifyContent" class="verify-card">
            <div class="loading">Vérification en cours...</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3002';

        async function verifyReceipt() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const transactionId = urlParams.get('id');

                if (!transactionId) {
                    throw new Error('ID de transaction manquant');
                }

                // Récupérer les détails de la transaction
                const response = await fetch(`${API_URL}/sales/verify/${transactionId}`);

                if (!response.ok) {
                    throw new Error('Transaction introuvable');
                }

                const data = await response.json();
                displayVerification(data);

            } catch (error) {
                console.error('Error verifying receipt:', error);
                document.getElementById('verifyContent').innerHTML = `
                    <div class="error-message">
                        <div class="status-badge status-invalid">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                            Reçu Invalide
                        </div>
                        <p style="margin-top: 20px;">Ce reçu n'a pas pu être vérifié.</p>
                        <p style="margin-top: 10px; font-size: 14px;">Veuillez vérifier le QR code et réessayer.</p>
                    </div>
                `;
            }
        }

        function displayVerification(data) {
            const { sale, farmerHistory, summary } = data;

            document.getElementById('verifyContent').innerHTML = `
                <div class="verify-header">
                    <div class="verify-title">🔍 VÉRIFICATION DE REÇU</div>
                    <div class="verify-subtitle">CottonPay ID - Bénin</div>
                    <div class="status-badge status-verified">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        Reçu Authentique
                    </div>
                </div>

                <div class="transaction-section">
                    <div class="section-title">📄 Détails de la Transaction</div>

                    <div class="amount-display">
                        <div class="amount-label">Montant de la Vente</div>
                        <div class="amount-value">${sale.totalAmount.toLocaleString('fr-FR')} FCFA</div>
                    </div>

                    <div class="details-grid">
                        <div class="detail-item">
                            <div class="detail-label">Transaction ID</div>
                            <div class="detail-value">${sale.transactionId}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Date</div>
                            <div class="detail-value">${sale.saleDate}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Heure</div>
                            <div class="detail-value">${sale.saleTime}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Agriculteur</div>
                            <div class="detail-value">${sale.farmerName}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Téléphone</div>
                            <div class="detail-value">${sale.farmerPhone}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Poids</div>
                            <div class="detail-value">${sale.weight} kg</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Prix unitaire</div>
                            <div class="detail-value">${sale.unitPrice} FCFA/kg</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Référence paiement</div>
                            <div class="detail-value">${sale.paymentReference}</div>
                        </div>
                    </div>
                </div>

                <div class="transaction-section">
                    <div class="section-title">💰 Historique des Revenus de l'Agriculteur</div>
                    <p style="color: rgba(248, 250, 252, 0.7); font-size: 14px; margin-bottom: 20px;">
                        Informations pour évaluation de crédit
                    </p>

                    <div class="history-summary">
                        <div class="summary-card">
                            <div class="summary-label">Total des Ventes</div>
                            <div class="summary-value">${summary.totalSales}</div>
                        </div>
                        <div class="summary-card">
                            <div class="summary-label">Revenus Totaux</div>
                            <div class="summary-value">${summary.totalRevenue.toLocaleString('fr-FR')}</div>
                            <div class="summary-label" style="margin-top: 4px;">FCFA</div>
                        </div>
                        <div class="summary-card">
                            <div class="summary-label">Revenu Moyen</div>
                            <div class="summary-value">${summary.averageRevenue.toLocaleString('fr-FR')}</div>
                            <div class="summary-label" style="margin-top: 4px;">FCFA</div>
                        </div>
                    </div>

                    ${farmerHistory.length > 0 ? `
                        <div class="history-list">
                            <div style="color: rgba(248, 250, 252, 0.7); font-size: 14px; margin-bottom: 10px; font-weight: 600;">
                                Dernières Transactions
                            </div>
                            ${farmerHistory.slice(0, 5).map(h => `
                                <div class="history-item">
                                    <div>
                                        <div class="history-date">${h.saleDate} ${h.saleTime}</div>
                                        <div style="color: rgba(248, 250, 252, 0.8); font-size: 14px; margin-top: 4px;">
                                            ${h.weight} kg × ${h.unitPrice} FCFA/kg
                                        </div>
                                    </div>
                                    <div class="history-amount">${h.totalAmount.toLocaleString('fr-FR')} FCFA</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // Lancer la vérification au chargement
        verifyReceipt();
    </script>
</body>
</html>
