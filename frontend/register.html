<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - CottonPay ID</title>

    <!-- Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #F59E0B;
            --secondary: #FBBF24;
            --cta: #8B5CF6;
            --background: #0F172A;
            --text: #F8FAFC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, var(--primary) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, var(--cta) 0%, transparent 50%);
            opacity: 0.15;
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            color: var(--primary);
            filter: drop-shadow(0 4px 8px rgba(245, 158, 11, 0.3));
        }

        h1 {
            color: var(--text);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            color: rgba(248, 250, 252, 0.85);
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            transition: border-color 0.2s ease-out, background 0.2s ease-out;
        }

        input::placeholder {
            color: rgba(248, 250, 252, 0.5);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.15);
        }

        select {
            cursor: pointer;
        }

        select option {
            background: var(--background);
            color: var(--text);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.15s ease-out,
                        background-color 0.2s ease-out,
                        box-shadow 0.2s ease-out;
            margin-top: 10px;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:focus-visible {
            outline: 3px solid var(--cta);
            outline-offset: 3px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        .icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: left;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            color: #D1FAE5;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            color: #FEE2E2;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .help-text {
            font-size: 12px;
            color: rgba(248, 250, 252, 0.6);
            margin-top: 4px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 22px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .btn {
                font-size: 14px;
                padding: 12px;
            }

            .logo {
                width: 56px;
                height: 56px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <svg class="logo" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>

            <h1>Créer votre compte CottonPay ID</h1>
            <p class="subtitle">Remplissez le formulaire pour créer votre identité numérique</p>
        </div>

        <div id="alertContainer"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="individualId">Numéro d'Identification Nationale (NPI) *</label>
                <input type="text" id="individualId" required
                       pattern="[0-9]{16}" maxlength="16"
                       placeholder="1234567890123456"
                       aria-label="Numéro d'Identification Nationale">
                <div class="help-text">16 chiffres</div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="givenName">Prénom *</label>
                    <input type="text" id="givenName" required placeholder="Koffi" aria-label="Prénom">
                </div>
                <div class="form-group">
                    <label for="familyName">Nom de famille *</label>
                    <input type="text" id="familyName" required placeholder="Mensah" aria-label="Nom de famille">
                </div>
            </div>

            <div class="form-group">
                <label for="dateOfBirth">Date de naissance *</label>
                <input type="date" id="dateOfBirth" required aria-label="Date de naissance">
            </div>

            <div class="form-group">
                <label for="gender">Genre *</label>
                <select id="gender" required aria-label="Genre">
                    <option value="">Sélectionner...</option>
                    <option value="Male">Masculin</option>
                    <option value="Female">Féminin</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phone">Téléphone *</label>
                <input type="tel" id="phone" required
                       pattern="\+229[0-9]{8}"
                       placeholder="+22997123456"
                       aria-label="Numéro de téléphone">
                <div class="help-text">Format: +229XXXXXXXX</div>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" required
                       placeholder="exemple@email.com"
                       aria-label="Adresse email">
            </div>

            <div class="form-group">
                <label for="streetAddress">Adresse</label>
                <input type="text" id="streetAddress" placeholder="Banikoara" aria-label="Adresse">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="locality">Commune</label>
                    <input type="text" id="locality" placeholder="Alibori" aria-label="Commune">
                </div>
                <div class="form-group">
                    <label for="region">Région</label>
                    <input type="text" id="region" placeholder="Alibori" aria-label="Région">
                </div>
            </div>

            <div class="form-group">
                <label for="pin">Code PIN (OTP par défaut) *</label>
                <input type="text" id="pin" required
                       pattern="[0-9]{6}" maxlength="6"
                       value="111111"
                       aria-label="Code PIN">
                <div class="help-text">6 chiffres - utilisé pour l'authentification</div>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn" aria-label="Créer mon compte">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
                Créer mon compte
            </button>

            <button type="button" class="btn btn-secondary" onclick="window.location.href='/'" aria-label="Retour à l'accueil">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Retour
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner" role="status" aria-label="Chargement en cours"></div>
            <p style="color: var(--primary); margin-top: 10px;">Création de votre compte en cours...</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3002';

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}" role="alert" aria-live="polite">
                    ${message}
                </div>
            `;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        function setLoading(isLoading) {
            const form = document.getElementById('registerForm');
            const loading = document.getElementById('loading');
            const submitBtn = document.getElementById('submitBtn');

            if (isLoading) {
                form.style.display = 'none';
                loading.classList.add('active');
                submitBtn.disabled = true;
            } else {
                form.style.display = 'block';
                loading.classList.remove('active');
                submitBtn.disabled = false;
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            setLoading(true);

            const formData = {
                individualId: document.getElementById('individualId').value,
                givenName: document.getElementById('givenName').value,
                familyName: document.getElementById('familyName').value,
                dateOfBirth: document.getElementById('dateOfBirth').value.replace(/-/g, '/'),
                gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                streetAddress: document.getElementById('streetAddress').value || 'N/A',
                locality: document.getElementById('locality').value || 'N/A',
                region: document.getElementById('region').value || 'N/A',
                pin: document.getElementById('pin').value
            };

            try {
                const response = await fetch(`${API_URL}/register/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Compte créé avec succès! Redirection vers la connexion...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showAlert(result.error, 'error');
                    setLoading(false);
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Erreur de connexion au serveur. Vérifiez que le backend est démarré.', 'error');
                setLoading(false);
            }
        });
    </script>
</body>
</html>
