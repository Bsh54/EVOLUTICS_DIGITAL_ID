<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vente de Coton - CottonPay ID</title>

    <!-- Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #F59E0B;
            --secondary: #FBBF24;
            --cta: #8B5CF6;
            --background: #0F172A;
            --text: #F8FAFC;
            --success: #10B981;
            --danger: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, var(--primary) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, var(--cta) 0%, transparent 50%);
            opacity: 0.15;
            animation: rotate 30s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* En-tête utilisateur */
        .user-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        .user-name {
            font-size: 32px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .user-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: rgba(248, 250, 252, 0.85);
            font-size: 16px;
        }

        .user-detail {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .user-detail-icon {
            width: 20px;
            height: 20px;
            color: var(--primary);
        }

        /* Formulaire de vente */
        .sale-form {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            color: rgba(248, 250, 252, 0.85);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Poids avec contrôles */
        .weight-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .weight-input-wrapper {
            flex: 1;
            position: relative;
        }

        .weight-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            font-size: 48px;
            font-weight: 700;
            color: var(--background);
            text-align: center;
            font-family: inherit;
            transition: all 0.2s ease-out;
        }

        .weight-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2);
        }

        .weight-unit {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            font-weight: 600;
            color: rgba(15, 23, 42, 0.5);
            pointer-events: none;
        }

        .weight-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .weight-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .weight-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.4);
        }

        .weight-btn:active {
            transform: translateY(0);
        }

        .weight-btn:focus-visible {
            outline: 3px solid var(--cta);
            outline-offset: 3px;
        }

        /* Prix unitaire */
        .price-display {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
        }

        /* Séparateur */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            margin: 30px 0;
        }

        /* Montant total */
        .total-section {
            margin-bottom: 30px;
        }

        .total-display {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.4);
        }

        .total-label {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .total-amount {
            font-size: 56px;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* Bouton confirmer */
        .btn-confirm {
            width: 100%;
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            border: none;
            border-radius: 12px;
            padding: 20px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.15s ease-out;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-confirm:active {
            transform: translateY(0);
        }

        .btn-confirm:focus-visible {
            outline: 3px solid var(--cta);
            outline-offset: 3px;
        }

        /* Modal de confirmation */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            margin-bottom: 25px;
        }

        .modal-summary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            color: rgba(248, 250, 252, 0.9);
            font-size: 16px;
            line-height: 1.8;
        }

        .modal-summary strong {
            color: var(--primary);
            font-weight: 700;
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease-out;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-btn-cancel {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid rgba(239, 68, 68, 0.4);
            color: #FEE2E2;
        }

        .modal-btn-cancel:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        .modal-btn-confirm {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .modal-btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .modal-btn:active {
            transform: translateY(0);
        }

        .modal-btn:focus-visible {
            outline: 3px solid var(--cta);
            outline-offset: 3px;
        }

        /* Bouton déconnexion */
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #FEE2E2;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease-out;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-1px);
        }

        .logout-icon {
            width: 16px;
            height: 16px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            .user-name {
                font-size: 28px;
            }

            .weight-input {
                font-size: 36px;
                padding: 15px;
            }

            .weight-unit {
                font-size: 20px;
            }

            .weight-btn {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }

            .total-amount {
                font-size: 42px;
            }

            .modal {
                padding: 30px 20px;
            }

            .modal-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Bouton déconnexion -->
    <button class="logout-btn" onclick="handleLogout()" aria-label="Se déconnecter">
        <svg class="logout-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Déconnexion
    </button>

    <div class="container">
        <!-- En-tête utilisateur -->
        <div class="user-header">
            <div class="user-name" id="userName">Chargement...</div>
            <div class="user-details">
                <div class="user-detail">
                    <svg class="user-detail-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                    </svg>
                    <span>Mobile Money: <strong id="userPhone">-</strong></span>
                </div>
            </div>
        </div>

        <!-- Formulaire de vente -->
        <div class="sale-form">
            <h2 class="form-title">NOUVELLE VENTE DE COTON</h2>

            <!-- Poids -->
            <div class="form-section">
                <label class="form-label">Poids</label>
                <div class="weight-control">
                    <div class="weight-input-wrapper">
                        <input
                            type="number"
                            id="weightInput"
                            class="weight-input"
                            value="200"
                            min="1"
                            max="10000"
                            aria-label="Poids en kilogrammes"
                        >
                        <span class="weight-unit">kg</span>
                    </div>
                    <div class="weight-buttons">
                        <button class="weight-btn" onclick="incrementWeight()" aria-label="Augmenter le poids">+</button>
                        <button class="weight-btn" onclick="decrementWeight()" aria-label="Diminuer le poids">−</button>
                    </div>
                </div>
            </div>

            <!-- Prix unitaire -->
            <div class="form-section">
                <label class="form-label">Prix unitaire (fixé)</label>
                <div class="price-display">
                    <span id="unitPrice">250</span> FCFA par kilogramme
                </div>
            </div>

            <!-- Séparateur -->
            <div class="divider"></div>

            <!-- Montant total -->
            <div class="total-section">
                <div class="total-display">
                    <div class="total-label">Montant Total</div>
                    <div class="total-amount" id="totalAmount">50 000 FCFA</div>
                </div>
            </div>

            <!-- Bouton confirmer -->
            <button class="btn-confirm" onclick="showConfirmationModal()">
                Confirmer la vente
            </button>
        </div>
    </div>

    <!-- Modal de confirmation -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 class="modal-title">Confirmation de vente</h3>
            <div class="modal-summary" id="modalSummary">
                Vous vendez <strong id="modalWeight">200 kg</strong> de coton au prix de <strong id="modalUnitPrice">250 FCFA/kg</strong>.<br><br>
                Vous allez recevoir <strong id="modalTotal">50 000 FCFA</strong> sur votre compte MTN <strong id="modalPhone">97 12 34 56</strong>.
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeModal()">
                    Annuler
                </button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmSale()">
                    Confirmer la vente
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3002';
        const UNIT_PRICE = 250; // Prix fixe par kg

        // Charger les informations utilisateur
        async function loadUserInfo() {
            try {
                const response = await fetch(`${API_URL}/user/profile`, {
                    credentials: 'include'
                });

                if (!response.ok) {
                    window.location.href = '/';
                    return;
                }

                const data = await response.json();
                const user = data.user;

                document.getElementById('userName').textContent = user.name || 'Utilisateur';
                document.getElementById('userPhone').textContent = user.phone_number || '-';

            } catch (error) {
                console.error('Error loading user info:', error);
                window.location.href = '/';
            }
        }

        // Calculer le montant total
        function calculateTotal() {
            const weight = parseInt(document.getElementById('weightInput').value) || 0;
            const total = weight * UNIT_PRICE;
            document.getElementById('totalAmount').textContent = total.toLocaleString('fr-FR') + ' FCFA';
            return total;
        }

        // Incrémenter le poids
        function incrementWeight() {
            const input = document.getElementById('weightInput');
            const currentValue = parseInt(input.value) || 0;
            input.value = currentValue + 10;
            calculateTotal();
        }

        // Décrémenter le poids
        function decrementWeight() {
            const input = document.getElementById('weightInput');
            const currentValue = parseInt(input.value) || 0;
            if (currentValue > 10) {
                input.value = currentValue - 10;
                calculateTotal();
            }
        }

        // Afficher le modal de confirmation
        function showConfirmationModal() {
            const weight = parseInt(document.getElementById('weightInput').value) || 0;

            if (weight <= 0) {
                alert('Veuillez entrer un poids valide');
                return;
            }

            const total = weight * UNIT_PRICE;
            const phone = document.getElementById('userPhone').textContent;

            document.getElementById('modalWeight').textContent = weight + ' kg';
            document.getElementById('modalUnitPrice').textContent = UNIT_PRICE + ' FCFA/kg';
            document.getElementById('modalTotal').textContent = total.toLocaleString('fr-FR') + ' FCFA';
            document.getElementById('modalPhone').textContent = phone;

            document.getElementById('modalOverlay').classList.add('active');
        }

        // Fermer le modal
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // Fermer le modal en cliquant sur l'overlay
        function closeModalOnOverlay(event) {
            if (event.target.id === 'modalOverlay') {
                closeModal();
            }
        }

        // Confirmer la vente
        async function confirmSale() {
            const weight = parseInt(document.getElementById('weightInput').value) || 0;
            const total = weight * UNIT_PRICE;

            try {
                // Désactiver le bouton pendant le traitement
                const confirmBtn = document.querySelector('.modal-btn-confirm');
                confirmBtn.disabled = true;
                confirmBtn.textContent = 'Traitement en cours...';

                // Envoyer la vente au backend
                const response = await fetch(`${API_URL}/sales/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        weight: weight,
                        unitPrice: UNIT_PRICE
                    })
                });

                if (!response.ok) {
                    throw new Error('Erreur lors de la confirmation de la vente');
                }

                const data = await response.json();

                console.log('Vente confirmée:', data);

                closeModal();

                // Afficher l'écran de confirmation finale
                showSuccessScreen(data);

            } catch (error) {
                console.error('Error confirming sale:', error);
                alert('Erreur lors de la confirmation de la vente. Veuillez réessayer.');

                // Réactiver le bouton
                const confirmBtn = document.querySelector('.modal-btn-confirm');
                confirmBtn.disabled = false;
                confirmBtn.textContent = 'Confirmer la vente';
            }
        }

        // Afficher l'écran de confirmation finale
        function showSuccessScreen(saleData) {
            const container = document.querySelector('.container');

            container.innerHTML = `
                <div class="success-screen">
                    <div class="success-icon">
                        <svg width="80" height="80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>

                    <h1 class="success-title">✅ VENTE TERMINÉE AVEC SUCCÈS</h1>

                    <div class="success-amount">
                        <div class="amount-value">${saleData.sale.totalAmount.toLocaleString('fr-FR')} FCFA</div>
                        <div class="amount-label">ont été envoyés sur votre compte</div>
                        <div class="amount-phone">MTN ${saleData.sale.farmerPhone}</div>
                    </div>

                    <div class="receipt-section">
                        <div class="receipt-icon">
                            <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <h2 class="receipt-title">📄 REÇU OFFICIEL GÉNÉRÉ</h2>
                        <p class="receipt-text">
                            Un reçu numérique vérifiable a été généré.<br>
                            Vous pouvez le consulter dans votre portefeuille numérique.
                        </p>

                        <div class="receipt-details">
                            <div class="detail-row">
                                <span class="detail-label">Transaction ID:</span>
                                <span class="detail-value">${saleData.sale.transactionId}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Date:</span>
                                <span class="detail-value">${saleData.sale.saleDate} ${saleData.sale.saleTime}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Poids:</span>
                                <span class="detail-value">${saleData.sale.weight} kg</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Prix unitaire:</span>
                                <span class="detail-value">${saleData.sale.unitPrice} FCFA/kg</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Référence paiement:</span>
                                <span class="detail-value">${saleData.sale.paymentReference}</span>
                            </div>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-secondary-action" onclick="location.reload()">
                            Nouvelle vente
                        </button>
                        <button class="btn-primary-action" onclick="window.location.href='/dashboard.html'">
                            Retour au tableau de bord
                        </button>
                    </div>
                </div>
            `;

            // Ajouter les styles pour l'écran de succès
            addSuccessScreenStyles();
        }

        // Ajouter les styles CSS pour l'écran de succès
        function addSuccessScreenStyles() {
            if (document.getElementById('success-styles')) return;

            const style = document.createElement('style');
            style.id = 'success-styles';
            style.textContent = `
                .success-screen {
                    text-align: center;
                    padding: 20px;
                }

                .success-icon {
                    width: 80px;
                    height: 80px;
                    margin: 0 auto 30px;
                    color: var(--success);
                    animation: scaleIn 0.5s ease-out;
                }

                @keyframes scaleIn {
                    from { transform: scale(0); opacity: 0; }
                    to { transform: scale(1); opacity: 1; }
                }

                .success-title {
                    font-size: 28px;
                    font-weight: 800;
                    color: var(--text);
                    margin-bottom: 40px;
                    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
                }

                .success-amount {
                    background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
                    border-radius: 20px;
                    padding: 40px;
                    margin-bottom: 40px;
                    box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
                }

                .amount-value {
                    font-size: 48px;
                    font-weight: 800;
                    color: white;
                    margin-bottom: 10px;
                    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
                }

                .amount-label {
                    font-size: 16px;
                    color: rgba(255, 255, 255, 0.9);
                    margin-bottom: 10px;
                }

                .amount-phone {
                    font-size: 24px;
                    font-weight: 700;
                    color: white;
                }

                .receipt-section {
                    background: rgba(255, 255, 255, 0.1);
                    backdrop-filter: blur(10px);
                    border: 1px solid rgba(255, 255, 255, 0.2);
                    border-radius: 20px;
                    padding: 40px;
                    margin-bottom: 30px;
                }

                .receipt-icon {
                    width: 48px;
                    height: 48px;
                    margin: 0 auto 20px;
                    color: var(--primary);
                }

                .receipt-title {
                    font-size: 24px;
                    font-weight: 700;
                    color: var(--text);
                    margin-bottom: 15px;
                }

                .receipt-text {
                    color: rgba(248, 250, 252, 0.85);
                    font-size: 16px;
                    line-height: 1.6;
                    margin-bottom: 30px;
                }

                .receipt-details {
                    background: rgba(255, 255, 255, 0.05);
                    border-radius: 12px;
                    padding: 20px;
                    margin-bottom: 20px;
                    text-align: left;
                }

                .detail-row {
                    display: flex;
                    justify-content: space-between;
                    padding: 10px 0;
                    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                }

                .detail-row:last-child {
                    border-bottom: none;
                }

                .detail-label {
                    color: rgba(248, 250, 252, 0.7);
                    font-size: 14px;
                }

                .detail-value {
                    color: var(--text);
                    font-weight: 600;
                    font-size: 14px;
                }

                .credential-info {
                    margin-top: 20px;
                    padding-top: 20px;
                    border-top: 1px solid rgba(255, 255, 255, 0.2);
                }

                .credential-id {
                    color: rgba(248, 250, 252, 0.7);
                    font-size: 12px;
                    margin-bottom: 15px;
                    font-family: monospace;
                }

                .btn-wallet {
                    display: inline-flex;
                    align-items: center;
                    gap: 10px;
                    background: linear-gradient(135deg, var(--cta) 0%, #7C3AED 100%);
                    color: white;
                    padding: 12px 24px;
                    border-radius: 10px;
                    text-decoration: none;
                    font-weight: 600;
                    transition: all 0.15s ease-out;
                    box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
                }

                .btn-wallet:hover {
                    transform: translateY(-2px);
                    box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
                }

                .action-buttons {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 15px;
                }

                .btn-secondary-action {
                    padding: 16px;
                    background: rgba(255, 255, 255, 0.1);
                    border: 2px solid rgba(255, 255, 255, 0.3);
                    color: var(--text);
                    border-radius: 12px;
                    font-size: 16px;
                    font-weight: 600;
                    cursor: pointer;
                    transition: all 0.15s ease-out;
                    font-family: inherit;
                }

                .btn-secondary-action:hover {
                    background: rgba(255, 255, 255, 0.2);
                    transform: translateY(-2px);
                }

                .btn-primary-action {
                    padding: 16px;
                    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
                    border: none;
                    color: white;
                    border-radius: 12px;
                    font-size: 16px;
                    font-weight: 600;
                    cursor: pointer;
                    transition: all 0.15s ease-out;
                    font-family: inherit;
                    box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
                }

                .btn-primary-action:hover {
                    transform: translateY(-2px);
                    box-shadow: 0 8px 20px rgba(245, 158, 11, 0.4);
                }

                @media (max-width: 600px) {
                    .success-title {
                        font-size: 22px;
                    }

                    .amount-value {
                        font-size: 36px;
                    }

                    .action-buttons {
                        grid-template-columns: 1fr;
                    }
                }
            `;
            document.head.appendChild(style);
        }

        // Déconnexion
        async function handleLogout() {
            try {
                await fetch(`${API_URL}/auth/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });

                window.location.href = '/';
            } catch (error) {
                console.error('Logout error:', error);
            }
        }

        // Écouter les changements de poids
        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            calculateTotal();

            const weightInput = document.getElementById('weightInput');
            weightInput.addEventListener('input', calculateTotal);

            // Fermer le modal avec Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
        });
    </script>
</body>
</html>
